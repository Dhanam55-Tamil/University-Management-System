<!DOCTYPE html>
<html>
<head>
  <title>Admin - Add Faculty</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>Add Faculty</h2>

  <form id="facultyForm">
    <input type="text" id="name" placeholder="Faculty Name" required>
    <input type="text" id="designation" placeholder="Designation" required>
    <input type="text" id="dept" placeholder="Department" required>
    <input type="text" id="qualification" placeholder="Qualification">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="mobile" placeholder="Mobile Number" required>
    <input type="text" id="photo" placeholder="Photo URL (optional)">
    <button type="submit">Login</button>
  </form>

  <a href="faculty-profile.html">View Faculty</a>

  <script src="scrpt.js"></script>
</body>
</html>
